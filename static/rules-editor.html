<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Gateway v1.10 - Configuration Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <!-- CodeMirror Themes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/nord.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/eclipse.min.css">
    <!-- Add more theme CSS links here if needed -->
    <link rel="stylesheet" href="/static/editor.css">
</head>
<body>
    <div style="position: absolute; width: 100%;">
        <nav class="navbar">
            <a href="/v1/ui/usage-stats" class="nav-button">Usage Statistics</a>
            <button id="darkModeToggle" aria-label="Toggle dark mode">
                <span class="icon-placeholder"></span>
            </button>
        </nav>
    </div>    
    <div class="container">
        <h1>LLM Gateway - Configuration Editor <span style="font-size:small">(v1.10)</span></h1>

        <div class="tabs">
            <button id="tabRules" class="tab-button active" data-tab="rules">Fallback Rules</button>
            <button id="tabProviders" class="tab-button" data-tab="providers">Providers</button>
            <button id="tabAgents" class="tab-button" data-tab="agents">Agents Integration</button>
        </div>

        <div style="position:relative">
            <div class="controls">
                <label for="themeSelector">Editor Theme:</label>
                <select id="themeSelector">
                    {/* Options will be populated by JavaScript */}
                </select>
            </div>
            <div id="editor-container-rules" class="editor-tab-content active">
                <textarea id="jsonEditorRules"></textarea>
            </div>
            <div id="editor-container-providers" class="editor-tab-content" style="display: none;">
                <textarea id="jsonEditorProviders"></textarea>
            </div>
            <div id="editor-container-agents" class="editor-tab-content" style="display: none; padding: 20px;">
                <div class="export-section" style="border:none; margin-top:0; padding:0; background:transparent;">
                    <h2>Export configurations for coding agents</h2>
                    <p style="margin-bottom: 20px; color: var(--text-color); opacity: 0.8;">Download the models configuration in the format required by OpenCode or GitHub Copilot.</p>
                    <div class="export-controls">
                        <div class="checkbox-container">
                            <label class="switch">
                                <input type="checkbox" id="includeFallbackCheckbox">
                                <span class="slider round"></span>
                            </label>
                            <span class="checkbox-label">Include fallback provider models (e.g., OpenRouter models)</span>
                        </div>
                        <div class="export-buttons">
                            <button id="downloadOpenCodeBtn" class="export-button">
                                Download OpenCode JSON
                            </button>
                            <button id="downloadCopilotBtn" class="export-button">
                                Download GitHub Copilot JSON
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <button id="saveButton">Save Configuration</button>
        <div id="messageArea"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/lint/lint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/lint/json-lint.min.js"></script>
    <script src="https://unpkg.com/jsonlint@1.6.3/web/jsonlint.js"></script> 
    <script src="/static/editor.js"></script>
</body>
</html>
